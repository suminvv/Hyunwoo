<!DOCTYPE html>
<!-- saved from url=(0034)https://suminvv.github.io/Hyunwoo/ -->
<html lang="ko">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현우의 랜덤 어록!</title>
    <style>
      body {
        margin: 0;
        font-family: "Malgun Gothic", sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
  
      .container {
        width: 700px;
        max-width: 90%;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
  
      h1 {
        margin-top: 0;
        color: #222;
        margin-bottom: 25px;
      }
  
      #quoteBox {
        min-height: 120px;
        font-size: 24px;
        line-height: 1.7;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        border-radius: 16px;
        background: #f6f6f6;
        margin-bottom: 25px;
      }
  
      button {
        border: none;
        background: #4b3f72;
        color: white;
        font-size: 16px;
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
      }
  
      button:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>오늘의 현우 어록</h1>
      <div id="quoteBox">버튼을 눌러 문장을 확인하세요.</div>
      <button onclick="showRandomQuote()">어록 보기</button>
    </div>
    <script>
      let values;
      (async () => {
        const res = await (await fetch(`https://sheets.googleapis.com/v4/spreadsheets/1Nuhu668eZfRgaGq4sbJXX5GNMAYwsrK-K_DDJZ032nM/values/A2:A?key=AIzaSyCG4yVVjl_74z6t3X5Jz1pucbQonOViiPA`)).json();
        console.log("시트 결과 (raw): " + res);
  
        values = res.values.map(v => v[0]);
        console.log("시트 결과: " + values);
      })()
  
      async function showRandomQuote() {
        try {
          if (values.length === 0) document.getElementById("quoteBox").textContent = "null";
  
          const randomIndex = Math.floor(Math.random() * values.length);
          document.getElementById("quoteBox").textContent = values[randomIndex];
  
        } catch (err) {
          console.error(err);
          document.getElementById("quoteBox").textContent = err;
        }
      }
    </script>
  </body>
</html>
